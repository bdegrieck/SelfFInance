<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SelfFinance</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #051018;
            background-image: radial-gradient(#80ded902 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .article {
            color: #AEECEF; /* Note: changes the look of the text */
            font-family: Arial, sans-serif;
            font-size: 20px;
            background: linear-gradient(to bottom, #051018 0%, #163B47 100%);
            border: 1px solid rgba(174, 236, 239, 0.25);
            border-radius: 5%;
            padding: 35px;
            margin: 15px;
        }

        h1 {
            font-family: Arial, sans-serif; 
        }

    </style>

</head>
<body>
    <article class="article">
        <h1>Enter Stock Ticker</h1>
        <form action="/submit" method="post">
            <label for="stockTicker">Stock Ticker:</label><br />
            <input type="Text" id="stockTicker" name="stockTicker"/><br />

        </br>

            Do you want microeconomic data?

        </br>

            <input type="radio" name = "micro" value="yes"> Yes
            <input type="radio" name = "micro" value="no"> No 
        
        </br>
        </br>

            Select endpoints:

        <br />

            <input type="checkbox" id="companyOverview" name="companyOverview" value="companyOverview">
            <label for="companyOverview"> Company Overview + Price</label><br>
            <input type="checkbox" id="priceAndEPS" name="priceAndEPS" value="priceAndEPS">
            <label for="priceAndEPS"> EPS </label><br>
            <input type="checkbox" id="balanceSheet" name="balanceSheet" value="balanceSheet">
            <label for="balanceSheet"> Balance Sheet </label><br>

            <input type="submit" value="Submit"/>
            </form>
        </article>
</body>
</html>
